<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Hardware</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #2980b9;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }

        img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
    </style>
</head>

<body>

<h1 style="text-align:center;">Inventario de Hardware</h1>

<table>
    <tr>
        <th>Imagen</th>
        <th>Producto</th>
        <th>Categoría</th>
        <th>Precio</th>
    </tr>

    <tr>
        <td><img src="cpu.png"></td>
        <td>Procesador Quantum X1</td>
        <td>Hardware</td>
        <td>$2,450</td>
    </tr>

    <tr>
        <td><img src="ram.png"></td>
        <td>Memoria RAM DDR6</td>
        <td>Memoria</td>
        <td>$320</td>
    </tr>

    <tr>
        <td><img src="ssd.png"></td>
        <td>SSD 10TB</td>
        <td>Almacenamiento</td>
        <td>$850</td>
    </tr>

</table>

</body>
</html>
