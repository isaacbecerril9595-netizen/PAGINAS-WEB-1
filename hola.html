<!DOCTYPE html>
<html lang="es">
<head>

h1 {

    color: #2980b9;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);

th {

}

td {

    border-bottom: 1px solid #ccc;
}

tr:hover {
    background: #f2f2f2;
}

img {
    width: 120px;
    height: 120px;
    object-fit: contain;
}

</head>

<body>
